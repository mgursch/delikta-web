<svg xmlns="http://www.w3.org/2000/svg" width="320" height="660" viewBox="0 0 320 660" role="img" aria-label="Screenshot Platzhalter — Fall als Geschichte">
  <defs>
    <style>
      .serif{font-family:Georgia,'Times New Roman',serif}
      .mono{font-family:ui-monospace,Menlo,monospace}
    </style>
  </defs>
  <rect x="6" y="6" width="308" height="648" rx="40" fill="#1A212B" stroke="#374252" stroke-width="3"/>
  <rect x="18" y="18" width="284" height="624" rx="30" fill="#10141A"/>

  <!-- header: back · chapter progress · narrate -->
  <text x="40" y="60" class="mono" font-size="10" letter-spacing="2" fill="#8A94A1">‹ MENÜ</text>
  <text x="280" y="60" class="mono" font-size="9" letter-spacing="2" fill="#E0AA48" text-anchor="end">KAPITEL 3 / 7</text>

  <!-- progress dots -->
  <g>
    <rect x="40" y="74" width="32" height="4" rx="2" fill="#E0AA48"/>
    <rect x="76" y="74" width="32" height="4" rx="2" fill="#E0AA48"/>
    <rect x="112" y="74" width="32" height="4" rx="2" fill="#E0AA48"/>
    <rect x="148" y="74" width="32" height="4" rx="2" fill="#2A3340"/>
    <rect x="184" y="74" width="32" height="4" rx="2" fill="#2A3340"/>
    <rect x="220" y="74" width="32" height="4" rx="2" fill="#2A3340"/>
    <rect x="256" y="74" width="24" height="4" rx="2" fill="#2A3340"/>
  </g>

  <text x="40" y="108" class="serif" font-size="20" font-weight="bold" fill="#DBE1E9">Der Tod von Lenz</text>

  <!-- narrate button -->
  <rect x="40" y="120" width="120" height="26" rx="13" fill="#1A212B" stroke="#2A3340"/>
  <text x="100" y="137" class="mono" font-size="9" letter-spacing="1" fill="#8A94A1" text-anchor="middle">▶ FALL VORLESEN</text>

  <!-- story prose on paper -->
  <rect x="34" y="158" width="252" height="278" rx="6" fill="#ECE6D6" stroke="#D9D1BD" stroke-width="2"/>
  <text x="50" y="186" class="mono" font-size="9" letter-spacing="2" fill="#8A7F63">III · DAS ARBEITSZIMMER</text>
  <g class="serif" font-size="12" fill="#2C2820">
    <text x="50" y="212">Der Regen schlug gegen die hohen</text>
    <text x="50" y="232">Fenster, als Kommissar Roth das</text>
    <text x="50" y="252">Arbeitszimmer betrat. Auf dem</text>
    <text x="50" y="272">Schreibtisch lag ein zerbrochenes</text>
    <text x="50" y="292">Glas – daneben ein Brief, an Viktor</text>
    <text x="50" y="312">Hold gerichtet.</text>
    <text x="50" y="346">„Ich war den ganzen Abend im</text>
    <text x="50" y="366">Klub", beteuerte Hold. Doch der</text>
    <text x="50" y="386">Portier konnte sich an ihn nicht</text>
    <text x="50" y="406">erinnern.</text>
  </g>

  <!-- newly introduced suspect chip -->
  <rect x="34" y="450" width="252" height="52" rx="10" fill="#202836" stroke="#2A3340"/>
  <circle cx="60" cy="476" r="16" fill="#151A22" stroke="#3A4656"/>
  <circle cx="60" cy="471" r="5" fill="#8A94A1"/>
  <path d="M50 486 a10 7 0 0 1 20 0" fill="#8A94A1"/>
  <text x="86" y="472" class="serif" font-size="13" fill="#DBE1E9">Viktor Hold</text>
  <text x="86" y="490" class="serif" font-size="10" fill="#8A94A1">Geschäftspartner · neu im Fall</text>

  <!-- continue button -->
  <rect x="34" y="516" width="252" height="46" rx="10" fill="#E0AA48"/>
  <text x="160" y="544" class="serif" font-size="15" font-weight="bold" fill="#10141A" text-anchor="middle">Weiter ›</text>

  <text x="160" y="596" class="mono" font-size="8.5" letter-spacing="1.5" fill="#5D6776" text-anchor="middle">DIE AKTE FÜLLT SICH KAPITEL FÜR KAPITEL</text>
</svg>
