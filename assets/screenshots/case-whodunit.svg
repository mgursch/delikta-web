    <text x="48" y="330" class="serif" font-size="10" fill="#8A94A1">Notarin · Schwester des Opfers</text>
    <circle cx="266" cy="312" r="12" fill="none" stroke="#5D6776"/>
  </g>
  <g>
    <rect x="34" y="350" width="252" height="56" rx="8" fill="#202836" stroke="#E0AA48"/>
    <text x="48" y="378" class="serif" font-size="13" fill="#DBE1E9">Viktor Hold</text>
    <text x="48" y="396" class="serif" font-size="10" fill="#8A94A1">Geschäftspartner</text>
    <circle cx="266" cy="378" r="12" fill="#E0AA48"/>
    <text x="266" y="382" class="mono" font-size="12" fill="#10141A" text-anchor="middle">✓</text>
  </g>
  <g>
    <rect x="34" y="416" width="252" height="56" rx="8" fill="#202836" stroke="#2A3340"/>
