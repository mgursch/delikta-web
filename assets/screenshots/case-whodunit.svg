      .serif{font-family:Georgia,'Times New Roman',serif}
      .mono{font-family:ui-monospace,Menlo,monospace}
    </style>
  </defs>
  <rect x="6" y="6" width="308" height="648" rx="40" fill="#1A212B" stroke="#374252" stroke-width="3"/>
  <rect x="18" y="18" width="284" height="624" rx="30" fill="#10141A"/>
  <!-- status / header -->
  <text x="40" y="62" class="mono" font-size="10" letter-spacing="2" fill="#8A94A1">‹ MENÜ</text>
  <text x="280" y="62" class="mono" font-size="10" letter-spacing="2" fill="#E0AA48" text-anchor="end">SERIE 7</text>
  <text x="40" y="100" class="mono" font-size="9" letter-spacing="2" fill="#8A94A1">FALL-TYP: TÄTER · NR. 128</text>
  <text x="40" y="132" class="serif" font-size="20" font-weight="bold" fill="#DBE1E9">Der Tod von Lenz</text>
  <!-- paper brief -->
  <rect x="34" y="150" width="252" height="92" rx="6" fill="#ECE6D6" stroke="#D9D1BD" stroke-width="2"/>
  <line x1="48" y1="176" x2="272" y2="176" stroke="#CFC6AD"/>
  <line x1="48" y1="198" x2="272" y2="198" stroke="#CFC6AD"/>
  <line x1="48" y1="220" x2="272" y2="220" stroke="#CFC6AD"/>
  <text x="48" y="172" class="serif" font-size="11" fill="#2C2820">Vier Personen stehen unter Verdacht —</text>
  <text x="48" y="194" class="serif" font-size="11" fill="#2C2820">genau eine hatte Motiv, Mittel und</text>
  <text x="48" y="216" class="serif" font-size="11" fill="#2C2820">Gelegenheit. Wer ist der Täter?</text>
  <!-- suspects -->
  <text x="40" y="272" class="mono" font-size="9" letter-spacing="2" fill="#8A94A1">VERDÄCHTIGE</text>
  <g>
    <rect x="34" y="284" width="252" height="56" rx="8" fill="#202836" stroke="#2A3340"/>
