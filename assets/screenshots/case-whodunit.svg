  <!-- grid hint -->
  <text x="40" y="506" class="mono" font-size="9" letter-spacing="2" fill="#8A94A1">DEIN ERMITTLUNGSRASTER</text>
  <rect x="34" y="518" width="252" height="40" rx="8" fill="#151A22" stroke="#2A3340"/>
