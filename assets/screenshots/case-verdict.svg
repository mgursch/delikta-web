<svg xmlns="http://www.w3.org/2000/svg" width="320" height="660" viewBox="0 0 320 660" role="img" aria-label="Screenshot Platzhalter — Auflösung">
  <defs>
    <style>
      .serif{font-family:Georgia,'Times New Roman',serif}
      .mono{font-family:ui-monospace,Menlo,monospace}
    </style>
  </defs>
  <rect x="6" y="6" width="308" height="648" rx="40" fill="#1A212B" stroke="#374252" stroke-width="3"/>
  <rect x="18" y="18" width="284" height="624" rx="30" fill="#10141A"/>
  <text x="40" y="62" class="mono" font-size="10" letter-spacing="2" fill="#8A94A1">‹ MENÜ</text>
  <!-- badge -->
  <rect x="34" y="84" width="120" height="30" rx="15" fill="#2E6B43"/>
  <text x="94" y="104" class="mono" font-size="11" letter-spacing="2" fill="#ECE6D6" text-anchor="middle">GELÖST</text>
  <text x="40" y="156" class="serif" font-size="20" font-weight="bold" fill="#5FB27E">Aufgeklärt –</text>
  <text x="40" y="182" class="serif" font-size="20" font-weight="bold" fill="#5FB27E">Viktor Hold war es.</text>

  <!-- epilogue on paper -->
  <rect x="34" y="204" width="252" height="252" rx="6" fill="#ECE6D6" stroke="#D9D1BD" stroke-width="2"/>
  <text x="50" y="232" class="mono" font-size="9" letter-spacing="2" fill="#8A7F63">WAS WIRKLICH GESCHAH</text>
  <g class="serif" font-size="12" fill="#2C2820">
    <text x="50" y="258">Hold hatte den Brief gefälscht, um</text>
    <text x="50" y="278">sich das Erbe zu sichern – das Motiv.</text>
    <text x="50" y="298">Den Schlüssel zum Arbeitszimmer</text>
    <text x="50" y="318">trug er bei sich, und sein Alibi im</text>
    <text x="50" y="338">Klub ließ sich nicht bestätigen.</text>
  </g>
  <line x1="50" y1="360" x2="270" y2="360" stroke="#CFC6AD"/>
  <text x="50" y="386" class="serif" font-size="11" fill="#7A7363" font-style="italic">↳ Ada Brunner: kein Motiv.</text>
  <text x="50" y="408" class="serif" font-size="11" fill="#7A7363" font-style="italic">↳ Mara Senn: Alibi bestätigt.</text>
  <text x="50" y="430" class="serif" font-size="11" fill="#7A7363" font-style="italic">↳ Jonas Reiter: kein Zugang zur Waffe.</text>

  <!-- streak highlight -->
  <rect x="34" y="478" width="252" height="58" rx="12" fill="#151A22" stroke="#2A3340"/>
  <text x="50" y="504" class="serif" font-size="15" fill="#DBE1E9">Serie gehalten</text>
  <text x="50" y="524" class="mono" font-size="9" letter-spacing="1.5" fill="#8A94A1">8 TAGE IN SERIE · MORGEN GEHT ES WEITER</text>
  <text x="262" y="518" class="serif" font-size="26" font-weight="800" fill="#E0AA48" text-anchor="end">🔥</text>

  <rect x="34" y="552" width="252" height="36" rx="8" fill="#10141A" stroke="#2A3340"/>
  <text x="160" y="575" class="mono" font-size="10" letter-spacing="2" fill="#8A94A1" text-anchor="middle">AKTE GESCHLOSSEN</text>
</svg>
