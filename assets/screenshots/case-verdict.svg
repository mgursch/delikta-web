<svg xmlns="http://www.w3.org/2000/svg" width="320" height="660" viewBox="0 0 320 660" role="img" aria-label="Screenshot Platzhalter — Auflösung">
  <defs>
    <style>
      .serif{font-family:Georgia,'Times New Roman',serif}
      .mono{font-family:ui-monospace,Menlo,monospace}
    </style>
  </defs>
  <rect x="6" y="6" width="308" height="648" rx="40" fill="#1A212B" stroke="#374252" stroke-width="3"/>
  <rect x="18" y="18" width="284" height="624" rx="30" fill="#10141A"/>
  <text x="40" y="62" class="mono" font-size="10" letter-spacing="2" fill="#8A94A1">‹ MENÜ</text>
  <!-- badge -->
  <rect x="34" y="84" width="120" height="30" rx="15" fill="#2E6B43"/>
  <text x="94" y="104" class="mono" font-size="11" letter-spacing="2" fill="#ECE6D6" text-anchor="middle">GELÖST</text>
  <text x="40" y="156" class="serif" font-size="20" font-weight="bold" fill="#5FB27E">Aufgeklärt –</text>
  <text x="40" y="182" class="serif" font-size="20" font-weight="bold" fill="#5FB27E">Viktor Hold war es.</text>
  <!-- paper solution -->
  <rect x="34" y="204" width="252" height="240" rx="6" fill="#ECE6D6" stroke="#D9D1BD" stroke-width="2"/>
  <text x="50" y="236" class="serif" font-size="12" fill="#2C2820">Viktor Hold hatte Motiv, Mittel und</text>
  <text x="50" y="256" class="serif" font-size="12" fill="#2C2820">Gelegenheit.</text>
  <line x1="50" y1="276" x2="270" y2="276" stroke="#CFC6AD"/>
  <text x="50" y="302" class="serif" font-size="11" fill="#7A7363" font-style="italic">↳ Ada Brunner ausgeschlossen:</text>
  <text x="62" y="320" class="serif" font-size="11" fill="#7A7363" font-style="italic">keine Gelegenheit (Alibi).</text>
  <text x="50" y="346" class="serif" font-size="11" fill="#7A7363" font-style="italic">↳ Mara Senn ausgeschlossen:</text>
  <text x="62" y="364" class="serif" font-size="11" fill="#7A7363" font-style="italic">kein Motiv.</text>
  <text x="50" y="390" class="serif" font-size="11" fill="#7A7363" font-style="italic">↳ Jonas Reiter ausgeschlossen:</text>
  <text x="62" y="408" class="serif" font-size="11" fill="#7A7363" font-style="italic">kein Zugang zur Tatwaffe.</text>
  <text x="50" y="434" class="mono" font-size="10" letter-spacing="1" fill="#8A7F63">PUNKTE: 92 · TIPPS: 1</text>
  <!-- footer status -->
  <rect x="34" y="468" width="252" height="40" rx="8" fill="#151A22" stroke="#2A3340"/>
  <text x="160" y="493" class="mono" font-size="10" letter-spacing="2" fill="#8A94A1" text-anchor="middle">AKTE GESCHLOSSEN</text>
  <text x="160" y="560" class="serif" font-size="13" fill="#5D6776" text-anchor="middle">Morgen wartet der nächste Fall.</text>
</svg>
